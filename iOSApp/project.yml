name: RoyalVNCiOS
options:
  bundleIdPrefix: com.royalapps.royalvnc
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  RoyalVNCKit:
    path: ..

targets:
  RoyalVNCiOS:
    type: application
    platform: iOS
    sources:
      - path: ../Sources/RoyalVNCKitiOSDemo
    dependencies:
      - package: RoyalVNCKit
        product: RoyalVNCKit
    postBuildScripts:
      - script: |
          # Embed dynamic framework from SPM
          FRAMEWORK_SOURCE="${BUILT_PRODUCTS_DIR}/PackageFrameworks/RoyalVNCKit.framework"
          FRAMEWORK_DEST="${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          if [ -d "$FRAMEWORK_SOURCE" ]; then
            mkdir -p "$FRAMEWORK_DEST"
            cp -R "$FRAMEWORK_SOURCE" "$FRAMEWORK_DEST/"
            codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" --timestamp=none "$FRAMEWORK_DEST/RoyalVNCKit.framework"
          fi
        name: Embed RoyalVNCKit
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: RoyalVNC
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        CFBundleIconName: AppIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocalNetworkUsageDescription: "RoyalVNC uses the local network to discover VNC servers nearby."
        NSBonjourServices:
          - "_rfb._tcp"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.royalapps.royalvnc.ios
        PRODUCT_NAME: RoyalVNC
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
